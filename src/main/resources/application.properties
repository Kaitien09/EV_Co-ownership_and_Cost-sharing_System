spring.application.name=final

# =====================================================
# DATABASE CONFIGURATION
# =====================================================
# SQL Server Configuration
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ev_coownership;encrypt=true;trustServerCertificate=true
spring.datasource.username=appuser
spring.datasource.password=AppUser123!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# =====================================================
# JPA/HIBERNATE CONFIGURATION
# =====================================================
# update: Cập nhật schema tự động khi có thay đổi
# create-drop: Xóa và tạo lại schema mỗi lần chạy (chỉ dùng khi dev)
# validate: Chỉ validate schema, không thay đổi
# none: Không làm gì cả (dùng khi có Flyway)
spring.jpa.hibernate.ddl-auto=none

# =====================================================
# FLYWAY CONFIGURATION
# =====================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.sql-migration-prefix=V
spring.flyway.sql-migration-suffixes=.sql

# Hiển thị SQL queries trong console
spring.jpa.show-sql=true

# Format SQL cho dễ đọc
spring.jpa.properties.hibernate.format_sql=true

# Dialect cho SQL Server
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Tự động commit sau mỗi statement
spring.jpa.properties.hibernate.connection.autocommit=false

# =====================================================
# JWT CONFIGURATION
# =====================================================
# Secret key cho JWT (nên thay đổi trong production)
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# Thời gian hết hạn token (24 hours = 86400000 ms)
jwt.expiration=86400000

# =====================================================
# SERVER CONFIGURATION
# =====================================================
server.port=8080

# Disable Docker Compose
spring.docker.compose.enabled=false

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# =====================================================
# LOGGING CONFIGURATION
# =====================================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.example.demo=DEBUG

# =====================================================
# FILE UPLOAD CONFIGURATION (for future use)
# =====================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
